name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install csmake and csmake-packaging
        run: |
          pip install git+https://github.com/devops-csmake/csmake.git
          pip install git+https://github.com/devops-csmake/csmake-packaging.git

      - name: Build .csm package
        run: csmake --phase=package csm-node-runtime

      - name: Locate .csm file
        id: locate
        run: |
          CSM=$(find target -name '*.csm' | head -1)
          echo "path=$CSM" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$CSM")" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$CSM" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload .csm
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.path }}
          generate_release_notes: true

      - name: Open registry PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REGISTRY_PR_TOKEN }}
          script: |
            const version  = '${{ steps.version.outputs.version }}';
            const sha256   = '${{ steps.locate.outputs.sha256 }}';
            const csmName  = '${{ steps.locate.outputs.name }}';
            const pkgName  = 'csmake-node-runtime';

            const registry = { owner: 'devops-csmake', repo: 'csmake-registry' };
            let currentContent, currentSha;
            try {
              const resp = await github.rest.repos.getContent({
                ...registry, path: `index/${pkgName}.json`,
              });
              currentContent = Buffer.from(resp.data.content, 'base64').toString('utf8');
              currentSha     = resp.data.sha;
            } catch (e) {
              core.setFailed(`Could not fetch index/${pkgName}.json: ${e.message}`);
              return;
            }

            const index = JSON.parse(currentContent);
            index.versions[version] = {
              url: `https://github.com/devops-csmake/${pkgName}/releases/download/v${version}/${csmName}`,
              sha256: sha256,
              dependencies: {},
            };
            index.latest = version;

            const newContent = JSON.stringify(index, null, 2) + '\n';
            const branch     = `release/${pkgName}-${version}`;

            const mainRef = await github.rest.git.getRef({
              ...registry, ref: 'heads/main',
            });
            await github.rest.git.createRef({
              ...registry,
              ref: `refs/heads/${branch}`,
              sha: mainRef.data.object.sha,
            });
            await github.rest.repos.createOrUpdateFileContents({
              ...registry,
              path: `index/${pkgName}.json`,
              message: `chore: bump ${pkgName} to ${version}`,
              content: Buffer.from(newContent).toString('base64'),
              sha: currentSha,
              branch,
            });
            const pr = await github.rest.pulls.create({
              ...registry,
              title: `Release ${pkgName} ${version}`,
              body: [
                `Automated release PR for **${pkgName}** version \`${version}\`.`,
                '',
                `SHA256: \`${sha256}\``,
                '',
                `Source: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/releases/tag/v${version}`,
              ].join('\n'),
              head: branch,
              base: 'main',
            });
            core.info(`Registry PR opened: ${pr.data.html_url}`);
